<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jaehoon Choi — halfhoon.</title>
<meta name="description" content="Jaehoon Choi — Ph.D. student at Seoul National University, Human-Centered Computing Lab. Research on HCI, HAI, accessibility, and multimodal AI fairness." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Inter:wght@300;400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300..700;1,8..60,300..700&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #edeff4; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  * { box-sizing: border-box; }

  /* Hero micro-interactions */
  @keyframes h-draw {
    to { stroke-dashoffset: 0; }
  }
  @keyframes h-spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes h-pulse {
    0%, 100% { box-shadow: 0 0 0 4px rgba(0,0,0,0.13); }
    50%      { box-shadow: 0 0 0 9px rgba(0,0,0,0.04); }
  }
  .h-times {
    transition: transform 0.4s ease;
  }
  .h-researcher:hover .h-times,
  h1:hover .h-times {
    animation-duration: 3s !important;
  }

  /* Scroll-triggered fade-in */
  .h-reveal {
    opacity: 0;
    transform: translateY(18px);
    transition: opacity .7s cubic-bezier(.2,.7,.3,1), transform .7s cubic-bezier(.2,.7,.3,1);
    will-change: opacity, transform;
  }
  .h-reveal.is-visible {
    opacity: 1;
    transform: translateY(0);
  }

  @media (prefers-reduced-motion: reduce) {
    .h-times { animation: none !important; }
    .h-researcher svg path { stroke-dashoffset: 0 !important; animation: none !important; }
    .h-reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
  }

  /* Smooth anchor scrolling, offset for sticky bar */
  html { scroll-behavior: smooth; }
  section[id], header[id] { scroll-margin-top: 80px; }

  /* ---------- Responsive ---------- */

  /* Tablet: tighten outer padding */
  @media (max-width: 1024px) {
    .h-page-wrap { padding: 0 40px !important; }
    .h-hero { padding: 60px 0 48px !important; }
    .h-hero-grid {
      grid-template-columns: 1fr 280px !important;
      gap: 48px !important;
    }
    .h-hero h1 { font-size: 64px !important; }
  }

  /* Mobile: collapse to single column */
  @media (max-width: 720px) {
    .h-page-wrap { padding: 0 24px !important; }

    /* Top bar */
    .h-topbar { flex-wrap: wrap !important; gap: 10px 0; padding: 16px 0 !important; }
    .h-topbar-nav {
      width: 100%;
      gap: 16px !important;
      flex-wrap: wrap;
      font-size: 12px !important;
    }
    .h-topbar-brand { font-size: 24px !important; }

    /* Hero */
    .h-hero { padding: 40px 0 32px !important; }
    .h-hero-grid {
      grid-template-columns: 1fr !important;
      gap: 28px !important;
    }
    .h-hero-photo {
      order: -1;
      width: 220px !important;
      justify-self: start !important;
    }
    .h-hero h1 {
      font-size: 44px !important;
      line-height: 1.1 !important;
    }
    .h-hero-sub { font-size: 15px !important; }
    .h-hero-meta { flex-wrap: wrap; gap: 8px 14px !important; }

    /* Chapter header: stack number/label over title */
    .h-chapter-head {
      grid-template-columns: 1fr !important;
      gap: 18px !important;
      margin-bottom: 24px !important;
    }
    .h-chapter-aside { transform: none !important; margin-top: 8px !important; max-width: 100% !important; }

    /* Section chapters — overall vertical rhythm tighter */
    .h-reveal { padding: 48px 0 !important; }

    /* About drop cap — smaller */
    .h-dropcap { font-size: 48px !important; line-height: 0.9 !important; margin-right: 10px !important; }

    /* Now: 2-col → 1-col */
    .h-now-grid { grid-template-columns: 1fr !important; gap: 36px !important; }

    /* Research interests: 2-col → 1-col */
    .h-research-grid { grid-template-columns: 1fr !important; }

    /* Education row: stack dates over text */
    .h-edu-row { grid-template-columns: 1fr !important; gap: 4px !important; }
    .h-edu-dates { font-size: 12px !important; }

    /* Papers cards grid */
    .h-papers-grid { grid-template-columns: 1fr !important; }
    /* Papers timeline — make dates label-like */
    .h-papers-timeline-row { grid-template-columns: 1fr !important; gap: 8px !important; }

    /* Chapter aside (e.g. Papers view toggle) — below title on mobile */
    .h-chapter-aside-inline { margin-top: 10px; }

    /* Footer */
    .h-footer {
      flex-direction: column; gap: 10px;
      align-items: flex-start !important;
      padding: 24px 0 !important;
      font-size: 15px !important;
    }
  }

  /* Tweaks — edit-mode only */
  .tweaks-panel {
    position: fixed; bottom: 24px; right: 24px; z-index: 50;
    background: rgba(255, 255, 255, 0.96);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(15, 28, 51, 0.12);
    border-radius: 14px;
    padding: 16px 18px 14px;
    width: 280px;
    box-shadow: 0 12px 40px rgba(15, 28, 51, 0.15);
    font-family: "Inter", sans-serif;
    font-size: 13px;
    color: #0f1c33;
  }
  .tweaks-panel h4 {
    margin: 0 0 12px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase; color: #37466a;
  }
  .tweak-row { margin-bottom: 12px; }
  .tweak-row:last-child { margin-bottom: 0; }
  .tweak-label {
    font-size: 11px; font-weight: 600; color: #37466a;
    margin-bottom: 6px; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .tweak-opts { display: flex; gap: 6px; flex-wrap: wrap; }
  .tweak-opt {
    flex: 1; min-width: 0;
    padding: 7px 10px; border-radius: 8px;
    border: 1px solid rgba(15, 28, 51, 0.14);
    background: rgba(255, 255, 255, 0.6);
    font-size: 12px; font-weight: 500; color: #0f1c33;
    cursor: pointer; transition: all 0.15s ease;
    text-align: center;
    font-family: inherit;
  }
  .tweak-opt:hover { border-color: #1a2f5c; background: rgba(26, 47, 92, 0.06); }
  .tweak-opt.active {
    background: #1a2f5c; color: white; border-color: #1a2f5c;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="homepage-core.jsx"></script>
<script type="text/babel" src="homepage-papers.jsx"></script>
<script type="text/babel" src="homepage-sections.jsx"></script>

<script type="text/babel">
// Tweakable defaults — editable via the Tweaks panel.
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "ink",
  "papersView": "cards"
}/*EDITMODE-END*/;

function Homepage() {
  const [palette, setPalette]       = React.useState(TWEAK_DEFAULTS.palette);
  const [papersView, setPapersView] = React.useState(TWEAK_DEFAULTS.papersView);
  const [editMode, setEditMode]     = React.useState(false);
  const t = H_PALETTES[palette] || H_PALETTES.navyink;

  // Listen for host edit-mode messages.
  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e && e.data; if (!d || !d.type) return;
      if (d.type === '__activate_edit_mode')   setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    // Announce availability AFTER listener is in place.
    try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (_) {}
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const persist = (edits) => {
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*'); } catch (_) {}
  };

  const onPaletteChange = (p) => { setPalette(p); persist({ palette: p }); };
  const onPapersView    = (v) => { setPapersView(v); persist({ papersView: v }); };

  // Scroll-triggered reveal for sections.
  React.useEffect(() => {
    if (typeof IntersectionObserver === 'undefined') {
      document.querySelectorAll('.h-reveal').forEach(el => el.classList.add('is-visible'));
      return;
    }
    const io = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('is-visible');
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
    const els = document.querySelectorAll('.h-reveal');
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);

  return (
    <div style={{
      background: t.bg, color: t.ink, minHeight: '100vh',
      fontFamily: H_FONTS.body, fontSize: 15, lineHeight: 1.7,
    }}>
      <div className="h-page-wrap" style={{ maxWidth: 1200, margin: '0 auto', padding: '0 56px' }}>
      <H_TopBar t={t} />
      <H_Hero t={t} />
      <main style={{ padding: '0 0 72px' }}>
        <H_About t={t} />
        <H_Now t={t} />
        <H_Education t={t} />
        <H_Chapter
          t={t} id="papers"
          number="iv." label="papers"
          title="Things I've written with others."
          aside={
            <div style={{ display: 'inline-flex', gap: 4, padding: 4, background: t.paper,
              border: `1px solid ${t.rule}`, borderRadius: 999,
              fontFamily: H_FONTS.body, fontSize: 12, fontWeight: 500,
            }}>
              {[['cards', 'Cards'], ['list', 'List'], ['timeline', 'Timeline']].map(([k, label]) => (
                <button key={k}
                  onClick={() => onPapersView(k)}
                  style={{
                    border: 'none', cursor: 'pointer',
                    padding: '5px 12px', borderRadius: 999,
                    background: papersView === k ? t.accent : 'transparent',
                    color: papersView === k ? t.paper : t.inkSoft,
                    fontWeight: papersView === k ? 600 : 500,
                    letterSpacing: '0.02em',
                    transition: 'all .18s ease',
                    fontFamily: 'inherit', fontSize: 'inherit',
                  }}>
                  {label}
                </button>
              ))}
            </div>
          }>
          <H_Papers t={t} mode={papersView} />
        </H_Chapter>
        <H_Contact t={t} />
      </main>
      <H_Footer t={t} />
      </div>

      {editMode && (
        <div className="tweaks-panel">
          <h4>Tweaks</h4>
          <div className="tweak-row">
            <div className="tweak-label">Color theme</div>
            <div className="tweak-opts">
              {Object.entries(H_PALETTES).map(([k, v]) => (
                <button key={k}
                  className={'tweak-opt' + (palette === k ? ' active' : '')}
                  onClick={() => onPaletteChange(k)}>
                  {v.name}
                </button>
              ))}
            </div>
          </div>
          <div className="tweak-row">
            <div className="tweak-label">Papers view</div>
            <div className="tweak-opts">
              {[['cards', 'Cards'], ['list', 'List'], ['timeline', 'Timeline']].map(([k, label]) => (
                <button key={k}
                  className={'tweak-opt' + (papersView === k ? ' active' : '')}
                  onClick={() => onPapersView(k)}>
                  {label}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Homepage />);
</script>
</body>
</html>
